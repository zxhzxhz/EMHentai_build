name: Build Unsigned IPA for EMHenTai

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Target branch or tag to build'
        required: true
        default: 'main'

jobs:
  build:
    name: Build and Package IPA
    runs-on: macos-14

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: 'yuman07/emhentai'
          ref: ${{ github.event.inputs.branch }}
          
      # 改进点 1：将 Xcode 版本提升至 15.4，原生支持 PinsStorage version 3
      - name: Setup Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
          
      # 改进点 2：双保险机制，删除不兼容的依赖锁文件并强制重新解析
      - name: Resolve Swift Packages
        run: |
          # 删除可能导致版本冲突的依赖锁定文件
          rm -f EMHenTai.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
          # 强制 Xcode 提前独立解析并下载第三方依赖包
          xcodebuild -resolvePackageDependencies -project EMHenTai.xcodeproj -scheme EMHenTai
          
      - name: Build the app without signing
        run: |
          xcodebuild clean build \
            -project EMHenTai.xcodeproj \
            -scheme EMHenTai \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT=$(PWD)/build

      - name: Package to .ipa
        run: |
          mkdir -p Payload
          mv build/Release-iphoneos/EMHenTai.app Payload/
          zip -qr EMHenTai_Unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EMHenTai-Unsigned-IPA
          path: EMHenTai_Unsigned.ipa
          retention-days: 7
